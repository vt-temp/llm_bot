services:
  redis:
    image: redis:7-alpine
    container_name: llm-bot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: llm-bot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: llm_bot
      RABBITMQ_DEFAULT_PASS: llm_bot_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  redis_data:
  rabbitmq_data: